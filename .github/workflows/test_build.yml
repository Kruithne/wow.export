name: Test Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Test build
    strategy:
      matrix:
        include:
          - platform: win-x64
            os: windows-latest
          - platform: linux-x64
            os: ubuntu-22.04
          - platform: osx-x64
            os: macos-latest
          - platform: osx-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install node-gyp dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y build-essential
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.9.0'
      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'
      - name: Install node-gyp
        run: npm install -g node-gyp@latest
      - name: bun install
        run: bun install
      - name: Compile wow.export ${{ matrix.platform }}
        run: bun build.js ${{ matrix.platform }}
      - name: Ad-hoc codesign (macOS)
        if: startsWith(matrix.platform, 'osx')
        run: codesign --force --deep -s - bin/${{ matrix.platform }}/wow.export.app
      - name: Publish
        run: bun publish.js ${{ matrix.platform }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wow-export-${{ matrix.platform }}
          path: publish/${{ matrix.platform }}/*
          retention-days: 7
